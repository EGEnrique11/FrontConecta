<div class="p-6 bg-gray-100 min-h-screen">
    <!-- Título -->
    <h2 class="text-2xl font-bold text-gray-800 mb-6">Listado de Clientes</h2>
  
    <!-- Filtros -->
    <div class="flex items-center space-x-4 mb-6">
      <!-- Combo Box: Buscar por -->
      <mat-form-field appearance="outline" class="w-64">
        <mat-label>Buscar por</mat-label>
        <mat-select [(value)]="criterioSeleccionado" (selectionChange)="buscarClientes()">
          <mat-option *ngFor="let criterio of criteriosBusqueda" [value]="criterio.value">
            {{ criterio.viewValue }}
          </mat-option>
        </mat-select>
      </mat-form-field>
  
      <!-- Campo de búsqueda -->
      <mat-form-field appearance="outline" class="flex-1">
        <mat-label>Ingrese el valor</mat-label>
        <input matInput [(ngModel)]="valorBusqueda" (keyup.enter)="buscarClientes()" />
      </mat-form-field>
    </div>
  
    <!-- Tabla de Clientes -->
    <div class="overflow-x-auto bg-white shadow-md rounded-lg">
      <table mat-table [dataSource]="clientes" class="min-w-full">
        <!-- Código -->
        <ng-container matColumnDef="codigo">
          <th mat-header-cell *matHeaderCellDef> Código </th>
          <td mat-cell *matCellDef="let cliente"> {{ cliente.codigo }} </td>
        </ng-container>
  
        <!-- Documento -->
        <ng-container matColumnDef="documento">
          <th mat-header-cell *matHeaderCellDef> Documento </th>
          <td mat-cell *matCellDef="let cliente"> {{ cliente.documento }} </td>
        </ng-container>
  
        <!-- Nombre -->
        <ng-container matColumnDef="nombre">
          <th mat-header-cell *matHeaderCellDef> Nombre </th>
          <td mat-cell *matCellDef="let cliente"> {{ cliente.nombre }} </td>
        </ng-container>
  
        <!-- Celular -->
        <ng-container matColumnDef="celular">
          <th mat-header-cell *matHeaderCellDef> Celular </th>
          <td mat-cell *matCellDef="let cliente"> {{ cliente.celular }} </td>
        </ng-container>
  
        <!-- Dirección -->
        <ng-container matColumnDef="direccion">
          <th mat-header-cell *matHeaderCellDef> Dirección </th>
          <td mat-cell *matCellDef="let cliente"> {{ cliente.direccion }} </td>
        </ng-container>
  
        <!-- Servicio -->
        <ng-container matColumnDef="servicio">
          <th mat-header-cell *matHeaderCellDef> Servicio </th>
          <td mat-cell *matCellDef="let cliente"> {{ cliente.servicio }} </td>
        </ng-container>
  
        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  
    <!-- Paginación -->
    <mat-paginator [length]="totalClientes" [pageSize]="10" [pageSizeOptions]="[5, 10, 20]" 
      (page)="cambiarPagina($event)">
    </mat-paginator>
  </div>
