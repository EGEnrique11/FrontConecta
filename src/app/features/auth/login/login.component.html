<div class="conecta-bg-gradient">
    <div class="conecta-card">
        <h2 class="conecta-title">Σ11</h2>
        <p class="conecta-subtitle">Ingresa tus credenciales</p>
        
        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4">
            
            <div>
                <label class="conecta-label">Usuario</label>
                <input type="text" formControlName="username" class="conecta-input" placeholder="Ingresa tu usuario" [disabled]="isLoading()" />
            </div>

            <div class="relative">
                <label class="conecta-label">Contraseña</label>
                <input [type]="showPassword() ? 'text' : 'password'" formControlName="password" class="conecta-input" placeholder="••••••••" [disabled]="isLoading()" />
                
                <button type="button" class="absolute top-1/2 right-0 pr-3 flex items-center" (click)="togglePassword()" aria-label="Mostrar contraseña" [disabled]="isLoading()">
                    @if (showPassword()) {
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                        </svg>
                    } @else {
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.542-7a9.97 9.97 0 012.294-3.344M6.18 6.18A9.97 9.97 0 0112 5c4.478 0 8.268 2.943 9.542 7a10.05 10.05 0 01-1.223 2.506M3 3l18 18" />
                        </svg>
                    }
                </button>
            </div>

            @if (errorMessage()) {
                <div class="conecta-error-msg">
                    {{ errorMessage() }}
                </div>
            }

            <button type="submit" class="conecta-btn-primary" [disabled]="loginForm.invalid || isLoading()">
                @if (isLoading()) {
                    <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                    Iniciando...
                } @else {
                    Iniciar Sesión
                }
            </button>

        </form>
    </div>
</div>
